<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Egypt Universities Map (Leaflet + OSM)</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Font Awesome (allowed) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root{
      --bg: #0b1220;
      --panel: rgba(255,255,255,.86);
      --panelBorder: rgba(15, 23, 42, .14);
      --text: #0b1220;
      --muted: rgba(15, 23, 42, .68);
      --shadow: 0 22px 60px rgba(2, 6, 23, .22);

      --gov: #2563eb;       /* blue */
      --private: #8b5cf6;   /* violet */
      --national: #16a34a;  /* green */
      --all: #0ea5e9;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 600px at 20% 0%, rgba(59,130,246,.18), transparent 45%),
                  radial-gradient(900px 600px at 80% 10%, rgba(34,197,94,.12), transparent 50%),
                  radial-gradient(900px 600px at 40% 90%, rgba(139,92,246,.14), transparent 50%),
                  var(--bg);
      overflow: hidden;
    }

    /* Layout */
    .app{
      position: relative;
      height: 100%;
      width: 100%;
    }

    #map{
      position: absolute;
      inset: 0;
    }

    /* Floating top controls */
    .topbar{
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 500;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      pointer-events: none;
    }

    .controls{
      pointer-events: auto;
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--panelBorder);
      box-shadow: var(--shadow);
      border-radius: 16px;
      padding: 10px;
      backdrop-filter: blur(10px);
    }

    .search{
      flex: 1;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 0 10px;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, .10);
      background: rgba(255,255,255,.9);
      min-width: 220px;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    .search:focus-within{
      border-color: rgba(37,99,235,.35);
      box-shadow: 0 10px 24px rgba(37,99,235,.18);
      transform: translateY(-1px);
    }
    .search i{ color: rgba(15, 23, 42, .55); }
    .search input{
      border: 0;
      outline: 0;
      background: transparent;
      height: 38px;
      width: 100%;
      font-size: 14px;
      color: var(--text);
    }
    .search input::placeholder{ color: rgba(15, 23, 42, .55); }

    .chip{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, .10);
      background: rgba(255,255,255,.9);
      padding: 0 10px;
      height: 40px;
    }
    .chip label{
      font-size: 12px;
      color: rgba(15, 23, 42, .6);
      font-weight: 600;
    }
    .chip select{
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
    }

    .top-actions{
      pointer-events: auto;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }

    .btn{
      border: 1px solid rgba(255,255,255,.22);
      color: #fff;
      background: rgba(2, 6, 23, .55);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 44px rgba(2, 6, 23, .25);
      height: 44px;
      padding: 0 14px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .1px;
      display: inline-flex;
      gap: 10px;
      align-items: center;
      transition: transform .16s ease, background .16s ease;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(2,6,23,.62); }
    .btn:active{ transform: translateY(0px); }

    /* Sidebar */
    .sidebar{
      position: absolute;
      top: 78px;
      left: 14px;
      bottom: 14px;
      width: 360px;
      z-index: 450;
      background: var(--panel);
      border: 1px solid var(--panelBorder);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateX(0);
      transition: transform .22s ease;
    }
    .sidebar.hidden{
      transform: translateX(calc(-100% - 18px));
    }

    .sidebar-header{
      padding: 14px 14px 10px 14px;
      border-bottom: 1px solid rgba(15, 23, 42, .08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .sidebar-title{
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }
    .badge{
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(14,165,233,.65));
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: 0 12px 30px rgba(37,99,235,.25);
      flex: 0 0 auto;
    }
    .sidebar-title h2{
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-title p{
      margin: 2px 0 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .counter{
      font-size: 12px;
      font-weight: 800;
      color: rgba(15,23,42,.72);
      background: rgba(15,23,42,.06);
      border: 1px solid rgba(15,23,42,.08);
      padding: 6px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .sidebar-body{
      padding: 12px;
      overflow: auto;
    }
    .list{
      display: grid;
      gap: 10px;
    }
    .card{
      border: 1px solid rgba(15, 23, 42, .10);
      background: rgba(255,255,255,.9);
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    .card:hover{
      transform: translateY(-1px);
      border-color: rgba(37,99,235,.25);
      box-shadow: 0 14px 40px rgba(2, 6, 23, .10);
    }
    .card-row{
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .dot{
      width: 10px;
      height: 10px;
      border-radius: 99px;
      flex: 0 0 auto;
      box-shadow: 0 10px 20px rgba(2,6,23,.14);
    }
    .card h3{
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .1px;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta{
      margin-top: 6px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .pill{
      font-size: 11px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,.10);
      background: rgba(15,23,42,.05);
      color: rgba(15,23,42,.72);
    }

    /* Leaflet UI polish */
    .leaflet-control-zoom a{
      border-radius: 12px !important;
      overflow: hidden;
    }
    .leaflet-container{
      font: inherit;
    }
    .leaflet-popup-content-wrapper{
      border-radius: 14px;
      box-shadow: 0 16px 44px rgba(2,6,23,.18);
    }
    .leaflet-popup-content{
      margin: 12px 14px;
      font-size: 13px;
      line-height: 1.25rem;
    }
    .popup-title{
      font-weight: 900;
      margin: 0 0 6px 0;
      letter-spacing: .1px;
    }
    .popup-sub{
      margin: 0;
      color: rgba(15,23,42,.68);
      font-weight: 600;
      font-size: 12px;
    }

    /* Marker styles (DivIcon) */
    .uni-marker{
      position: relative;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      border: 2px solid rgba(255,255,255,.9);
      box-shadow: 0 16px 34px rgba(2, 6, 23, .25);
      transform-origin: bottom center;
      animation: pop .24s ease both;
    }
    .uni-marker::after{
      content: "";
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 10px solid currentColor;
      filter: drop-shadow(0 10px 12px rgba(2,6,23,.18));
      opacity: .95;
    }
    .uni-marker.gov{ background: linear-gradient(135deg, rgba(37,99,235,1), rgba(14,165,233,.85)); color: var(--gov); }
    .uni-marker.private{ background: linear-gradient(135deg, rgba(139,92,246,1), rgba(236,72,153,.85)); color: var(--private); }
    .uni-marker.national{ background: linear-gradient(135deg, rgba(22,163,74,1), rgba(34,197,94,.85)); color: var(--national); }
    .uni-marker i{ color: rgba(255,255,255,.95); font-size: 14px; }
    @keyframes pop{ from{ transform: translateY(-6px) scale(.92); opacity: .0 } to{ transform: translateY(0) scale(1); opacity: 1 } }

    /* Mobile */
    @media (max-width: 820px){
      .topbar{
        grid-template-columns: 1fr;
      }
      .top-actions{
        justify-content: flex-start;
      }
      .sidebar{
        width: min(92vw, 420px);
      }
    }
    @media (max-width: 520px){
      .controls{
        flex-wrap: wrap;
      }
      .chip{
        width: 100%;
        justify-content: space-between;
      }
      .search{
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="map" aria-label="Universities Map"></div>

    <div class="topbar">
      <div class="controls" role="region" aria-label="Map controls">
        <div class="search" title="Search for a university">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="searchInput" type="text" list="uniDatalist" placeholder="Search university (e.g., Cairo University)..." autocomplete="off" />
          <datalist id="uniDatalist"></datalist>
        </div>

        <div class="chip" title="Filter by type">
          <label for="typeFilter"><i class="fa-solid fa-filter"></i></label>
          <select id="typeFilter">
            <option value="all">All Universities</option>
            <option value="Government">Government</option>
            <option value="Private">Private</option>
            <option value="National">National</option>
          </select>
        </div>
      </div>

      <div class="top-actions">
        <button id="toggleSidebarBtn" class="btn" type="button" aria-label="Toggle sidebar">
          <i class="fa-solid fa-list"></i>
          <span>Universities</span>
        </button>
        <button id="resetViewBtn" class="btn" type="button" aria-label="Reset view">
          <i class="fa-solid fa-crosshairs"></i>
          <span>Egypt</span>
        </button>
      </div>
    </div>

    <aside id="sidebar" class="sidebar" aria-label="Universities sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">
          <div class="badge"><i class="fa-solid fa-graduation-cap"></i></div>
          <div style="min-width:0">
            <h2>Universities in Egypt</h2>
            <p>Search, filter, and jump to any location</p>
          </div>
        </div>
        <div id="visibleCount" class="counter">0 shown</div>
      </div>
      <div class="sidebar-body">
        <div id="list" class="list"></div>
      </div>
    </aside>
  </div>

  <script>
    /**
     * Universities dataset

     * - lat: number
     * - lng: number
     * - type: "Government" | "Private" | "National"
     *
     * Note: If you already have a `universities` array elsewhere, you can replace this one.
     */
    const universities = [
      // --- Government (Public) ---
      { name: "Cairo University", lat: 30.0278, lng: 31.2086, type: "Government" },
      { name: "Ain Shams University", lat: 30.0742, lng: 31.2841, type: "Government" },
      { name: "Alexandria University", lat: 31.2066, lng: 29.9187, type: "Government" },
      { name: "Assiut University", lat: 27.1867, lng: 31.1683, type: "Government" },
      { name: "Mansoura University", lat: 31.0424, lng: 31.3560, type: "Government" },
      { name: "Zagazig University", lat: 30.5877, lng: 31.5020, type: "Government" },
      { name: "Tanta University", lat: 30.7867, lng: 31.0004, type: "Government" },
      { name: "Helwan University", lat: 29.8646, lng: 31.3161, type: "Government" },
      { name: "Suez Canal University", lat: 30.6047, lng: 32.2723, type: "Government" },
      { name: "Benha University", lat: 30.4662, lng: 31.1848, type: "Government" },
      { name: "Fayoum University", lat: 29.3071, lng: 30.8422, type: "Government" },
      { name: "Beni-Suef University", lat: 29.0738, lng: 31.0979, type: "Government" },
      { name: "Minya University", lat: 28.1127, lng: 30.7480, type: "Government" },
      { name: "Sohag University", lat: 26.5569, lng: 31.6948, type: "Government" },
      { name: "South Valley University (Qena)", lat: 26.1579, lng: 32.7160, type: "Government" },
      { name: "Aswan University", lat: 24.0908, lng: 32.8990, type: "Government" },
      { name: "Kafr El Sheikh University", lat: 31.1090, lng: 30.9399, type: "Government" },
      { name: "Damietta University", lat: 31.4091, lng: 31.8131, type: "Government" },
      { name: "Suez University", lat: 29.9661, lng: 32.5498, type: "Government" },
      { name: "Port Said University", lat: 31.2567, lng: 32.2841, type: "Government" },

      { name: "New Valley University (Kharga)", lat: 25.4405, lng: 30.5453, type: "Government" },
      { name: "Matrouh University", lat: 31.3526, lng: 27.2373, type: "Government" },
      { name: "Luxor University", lat: 25.6872, lng: 32.6396, type: "Government" },
      { name: "Sohag National University (Sohag)", lat: 26.5557, lng: 31.6940, type: "Government" }, /* treated as gov in UI if needed */

      // --- National (Egyption National Universities / public-funded) ---
      { name: "Galala University", lat: 29.3516, lng: 32.3227, type: "National" },
      { name: "King Salman International University (Tor)", lat: 28.2419, lng: 33.6220, type: "National" },
      { name: "King Salman International University (Ras Sidr)", lat: 29.5886, lng: 32.7068, type: "National" },
      { name: "King Salman International University (Sharm El Sheikh)", lat: 27.9158, lng: 34.3299, type: "National" },
      { name: "Alamein International University", lat: 30.8332, lng: 28.9552, type: "National" },
      { name: "New Mansoura University", lat: 31.4484, lng: 31.7568, type: "National" },
      { name: "New Valley National University", lat: 25.4405, lng: 30.5453, type: "National" },

      // --- Private ---
      { name: "The American University in Cairo (AUC)", lat: 30.0234, lng: 31.4913, type: "Private" },
      { name: "German University in Cairo (GUC)", lat: 30.0257, lng: 31.4996, type: "Private" },
      { name: "British University in Egypt (BUE)", lat: 30.0074, lng: 31.4325, type: "Private" },
      { name: "Arab Academy for Science, Technology & Maritime Transport (AASTMT)", lat: 31.0962, lng: 29.7856, type: "Private" },
      { name: "October 6 University", lat: 29.9724, lng: 30.9456, type: "Private" },
      { name: "Misr University for Science and Technology (MUST)", lat: 29.9951, lng: 30.9635, type: "Private" },
      { name: "Misr International University (MIU)", lat: 29.9937, lng: 31.4498, type: "Private" },
      { name: "Future University in Egypt (FUE)", lat: 29.9866, lng: 31.4404, type: "Private" },
      { name: "Nile University", lat: 30.0736, lng: 31.0182, type: "Private" },
      { name: "Pharos University in Alexandria", lat: 31.1599, lng: 29.9186, type: "Private" },
      { name: "Sinai University (El Arish)", lat: 31.1252, lng: 33.8055, type: "Private" },
      { name: "Sinai University (Kantara)", lat: 30.8449, lng: 32.3238, type: "Private" },
      { name: "Modern Sciences and Arts University (MSA)", lat: 29.9503, lng: 30.9132, type: "Private" },
      { name: "Modern University for Technology and Information (MTI)", lat: 29.9848, lng: 31.3470, type: "Private" },
      { name: "Egyptian Russian University (ERU)", lat: 30.1377, lng: 31.6005, type: "Private" },
      { name: "Egypt-Japan University of Science and Technology (E-JUST)", lat: 30.2057, lng: 29.9283, type: "Private" },
      { name: "Heliopolis University for Sustainable Development", lat: 30.1964, lng: 31.5169, type: "Private" },
      { name: "Badr University in Cairo (BUC)", lat: 30.1158, lng: 31.7413, type: "Private" },
      { name: "Ahram Canadian University (ACU)", lat: 29.9555, lng: 30.9158, type: "Private" },
      { name: "Delta University for Science and Technology", lat: 31.2462, lng: 31.3082, type: "Private" },
      { name: "Nahda University (Beni Suef)", lat: 29.0375, lng: 31.1122, type: "Private" },
      { name: "University of Science and Technology at Zewail City", lat: 30.0182, lng: 31.2138, type: "Private" },
      { name: "Al-Azhar University", lat: 30.0484, lng: 31.2625, type: "Government" },
      { name: "Al-Azhar University (Assiut Branch)", lat: 27.1856, lng: 31.1672, type: "Government" },
      { name: "Al-Azhar University (Tanta Branch)", lat: 30.7900, lng: 31.0000, type: "Government" },
      { name: "Al-Azhar University (Zagazig Branch)", lat: 30.5870, lng: 31.5030, type: "Government" },

      // Extra well-known private / specialized
      { name: "French University in Egypt (UFE)", lat: 30.0453, lng: 31.2370, type: "Private" },
      { name: "Arab Open University (Egypt Branch)", lat: 30.0622, lng: 31.3340, type: "Private" },
      { name: "Egyptian Chinese University", lat: 30.1560, lng: 31.7370, type: "Private" },
      { name: "Horus University in Egypt", lat: 31.4179, lng: 31.7201, type: "Private" },
      { name: "Sphinx University", lat: 29.9994, lng: 30.9945, type: "Private" },
      { name: "Higher Technological Institute (10th of Ramadan)", lat: 30.2995, lng: 31.7420, type: "Private" },
      { name: "Canadian International College (CIC)", lat: 29.9860, lng: 31.4410, type: "Private" },
      { name: "Canadian International College (CIC)", lat: 29.9860, lng: 31.4410, type: "Private" }
    ];

    // --- Constants / Helpers ---
    const EGYPT_CENTER = [26.8206, 30.8025];
    const EGYPT_ZOOM = 6;
    const TYPE_COLORS = {
      Government: getComputedStyle(document.documentElement).getPropertyValue("--gov").trim(),
      Private: getComputedStyle(document.documentElement).getPropertyValue("--private").trim(),
      National: getComputedStyle(document.documentElement).getPropertyValue("--national").trim(),
    };

    function normalize(str) {
      return String(str || "")
        .toLowerCase()
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function markerIcon(type) {
      const t = (type || "Government").toLowerCase();
      const iconHtml = `<div class="uni-marker ${t}">
        <i class="fa-solid fa-building-columns" aria-hidden="true"></i>
      </div>`;
      return L.divIcon({
        className: "",
        html: iconHtml,
        iconSize: [34, 43],
        iconAnchor: [17, 43],
        popupAnchor: [0, -40]
      });
    }

    function typePill(type) {
      return `<span class="pill">${type}</span>`;
    }

    // --- Map init ---
    const map = L.map("map", {
      zoomControl: true,
      preferCanvas: true
    }).setView(EGYPT_CENTER, EGYPT_ZOOM);

    // OSM tiles (no API key required)
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Layer group for markers
    const markerLayer = L.layerGroup().addTo(map);

    // Index for search + sidebar
    const uniByKey = new Map(); // normalized name -> uni object
    const markerByKey = new Map(); // normalized name -> Leaflet marker

    // UI elements
    const listEl = document.getElementById("list");
    const typeFilterEl = document.getElementById("typeFilter");
    const searchInputEl = document.getElementById("searchInput");
    const uniDatalistEl = document.getElementById("uniDatalist");
    const visibleCountEl = document.getElementById("visibleCount");
    const sidebarEl = document.getElementById("sidebar");
    const toggleSidebarBtn = document.getElementById("toggleSidebarBtn");
    const resetViewBtn = document.getElementById("resetViewBtn");

    function popupHtml(uni) {
      return `
        <div>
          <div class="popup-title">${uni.name}</div>
          <p class="popup-sub">${uni.type}</p>
        </div>
      `;
    }

    function addAllMarkers() {
      markerLayer.clearLayers();
      markerByKey.clear();
      uniByKey.clear();

      for (const uni of universities) {
        const key = normalize(uni.name);
        uniByKey.set(key, uni);

        const m = L.marker([uni.lat, uni.lng], { icon: markerIcon(uni.type) })
          .bindPopup(popupHtml(uni), { closeButton: true, autoPan: true });

        m.on("click", () => {
          // Popup already shows on click; keeping hook for future enhancements.
        });

        markerLayer.addLayer(m);
        markerByKey.set(key, m);
      }
    }

    function renderDatalist() {
      uniDatalistEl.innerHTML = universities
        .slice()
        .sort((a, b) => a.name.localeCompare(b.name, "en", { sensitivity: "base" }))
        .map(u => `<option value="${u.name}"></option>`)
        .join("");
    }

    function matchesFilter(uni, typeValue) {
      if (!typeValue || typeValue === "all") return true;
      return uni.type === typeValue;
    }

    function renderSidebar(typeValue, searchValue) {
      const q = normalize(searchValue);
      const visible = [];

      for (const uni of universities) {
        if (!matchesFilter(uni, typeValue)) continue;
        if (q && !normalize(uni.name).includes(q)) continue;
        visible.push(uni);
      }

      visible.sort((a, b) => a.name.localeCompare(b.name, "en", { sensitivity: "base" }));
      visibleCountEl.textContent = `${visible.length} shown`;

      listEl.innerHTML = visible.map(uni => {
        const color = TYPE_COLORS[uni.type] || "#0ea5e9";
        return `
          <div class="card" data-uni="${encodeURIComponent(uni.name)}" role="button" tabindex="0" aria-label="Go to ${uni.name}">
            <div class="card-row">
              <span class="dot" style="background:${color}"></span>
              <h3 title="${uni.name}">${uni.name}</h3>
            </div>
            <div class="meta">
              ${typePill(uni.type)}
              <span class="pill">${uni.lat.toFixed(3)}, ${uni.lng.toFixed(3)}</span>
            </div>
          </div>
        `;
      }).join("") || `
        <div class="card" style="cursor:default">
          <div class="card-row">
            <span class="dot" style="background:#94a3b8"></span>
            <h3>No results</h3>
          </div>
          <div class="meta">
            <span class="pill">Try a different filter or search term</span>
          </div>
        </div>
      `;

      // Bind click / keyboard
      for (const el of listEl.querySelectorAll("[data-uni]")) {
        const name = decodeURIComponent(el.getAttribute("data-uni"));
        const key = normalize(name);
        const uni = uniByKey.get(key);
        const marker = markerByKey.get(key);
        if (!uni || !marker) continue;

        const go = () => {
          map.setView([uni.lat, uni.lng], Math.max(map.getZoom(), 13), { animate: true, duration: 0.6 });
          marker.openPopup();
          if (window.matchMedia("(max-width: 820px)").matches) {
            sidebarEl.classList.add("hidden");
          }
        };

        el.addEventListener("click", go);
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            go();
          }
        });
      }
    }

    function applyFilterToMarkers(typeValue, searchValue) {
      const q = normalize(searchValue);
      // Rebuild marker layer for simplicity and speed on this dataset size
      markerLayer.clearLayers();

      for (const uni of universities) {
        if (!matchesFilter(uni, typeValue)) continue;
        if (q && !normalize(uni.name).includes(q)) continue;
        const key = normalize(uni.name);
        const marker = markerByKey.get(key);
        if (marker) markerLayer.addLayer(marker);
      }
    }

    function refresh() {
      const typeValue = typeFilterEl.value;
      const q = searchInputEl.value;
      applyFilterToMarkers(typeValue, q);
      renderSidebar(typeValue, q);
    }

    function zoomToUniversityByName(name) {
      const key = normalize(name);
      const uni = uniByKey.get(key);
      const marker = markerByKey.get(key);
      if (!uni || !marker) return false;

      // Ensure marker is visible even if filtered
      typeFilterEl.value = "all";
      searchInputEl.value = uni.name;
      refresh();

      map.setView([uni.lat, uni.lng], 13, { animate: true, duration: 0.7 });
      marker.openPopup();
      return true;
    }

    // Search behavior (Enter -> best match)
    searchInputEl.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      const raw = searchInputEl.value;
      const q = normalize(raw);
      if (!q) return;

      // Exact match first
      for (const uni of universities) {
        if (normalize(uni.name) === q) {
          zoomToUniversityByName(uni.name);
          return;
        }
      }
      // Contains match fallback
      const candidate = universities.find(u => normalize(u.name).includes(q));
      if (candidate) zoomToUniversityByName(candidate.name);
    });

    // Live filtering for UI
    typeFilterEl.addEventListener("change", refresh);
    searchInputEl.addEventListener("input", () => {
      // Keep it smooth without heavy work
      window.clearTimeout(searchInputEl._t);
      searchInputEl._t = window.setTimeout(() => {
        refresh();
        // If user selected an option from datalist (exact name), jump immediately
        const exact = universities.find(u => normalize(u.name) === normalize(searchInputEl.value));
        if (exact) zoomToUniversityByName(exact.name);
      }, 90);
    });

    toggleSidebarBtn.addEventListener("click", () => {
      sidebarEl.classList.toggle("hidden");
    });

    resetViewBtn.addEventListener("click", () => {
      map.setView(EGYPT_CENTER, EGYPT_ZOOM, { animate: true, duration: 0.7 });
      if (map.getPopup()) map.closePopup();
      searchInputEl.value = "";
      typeFilterEl.value = "all";
      refresh();
    });

    // Initial load
    addAllMarkers();
    renderDatalist();
    refresh();

    // Fit bounds nicely once (only if we have markers)
    try {
      const bounds = L.latLngBounds(universities.map(u => [u.lat, u.lng]));
      if (bounds.isValid()) map.fitBounds(bounds.pad(0.12), { animate: true, duration: 0.6 });
    } catch {}
  </script>
</body>
</html>
