<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EDU System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chart.js">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-university"></i>
                <h3>EDU Admin</h3>
            </div>
            <nav class="nav-menu">
                <a href="/dashboard" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/admin" class="nav-item">
                    <i class="fas fa-database"></i>
                    <span>Manage Data</span>
                </a>
                <a href="/map" class="nav-item">
                    <i class="fas fa-map-location-dot"></i>
                    <span>Universities Map</span>
                </a>
<a href="/api/profile/profile" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
                <a href="/admin-logout" class="nav-item">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <!-- Top bar -->
            <header class="top-bar">
                <button class="menu-toggle"><i class="fas fa-bars"></i></button>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
                <div class="user-profile">
                    <span>Welcome, Admin</span>
                </div>
            </header>

            <!-- Stats -->
            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-users stat-icon users"></i>
                        <div>
                            <h3 id="totalUsers">0</h3>
                            <p>Total Users</p>
                            <span class="growth +3.2%"></span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-school stat-icon unis"></i>
                        <div>
                            <h3 id="totalUnis">0</h3>
                            <p>Universities</p>
                            <span class="growth +1.8%"></span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-file-alt stat-icon apps"></i>
                        <div>
                            <h3 id="totalApps">0</h3>
                            <p>Applications</p>
                            <span class="growth -0.5%"></span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-comments stat-icon chats"></i>
                        <div>
                            <h3 id="totalChats">0</h3>
                            <p>Chats</p>
                            <span class="growth +12%"></span>
                        </div>
                    </div>
                </div>
            </section>

            <div class="content-grid">
                <!-- Chart -->
                <section class="chart-section">
                    <h2>Statistics Overview</h2>
                    <canvas id="statsChart"></canvas>
                </section>

                <!-- Recent activity -->
                <section class="activity-section">
                    <h2>Recent Activity</h2>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Action</th>
                                    <th>Time</th>
                                </tr>
                            </thead>
                            <tbody id="activityList">
                                <tr>
                                    <td colspan="3">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
